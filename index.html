<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ASPCC Price Compare - ADUSTECH</title>
<style>
body{font-family:Arial;background:#f0f4f8;margin:0;padding:10px}
h1{background:#0d47a1;color:#fff;padding:12px;text-align:center;border-radius:8px;font-size:15px;margin-bottom:12px}
.search{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:10px;box-sizing:border-box}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.box{background:#fff;padding:15px;border-radius:10px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,0.1);cursor:pointer}
.box b{color:#0d47a1;font-size:13px}
.page{display:none}.page.active{display:block}
.back{background:#c62828;color:#fff;border:none;padding:10px;width:100%;border-radius:6px;margin-bottom:10px;font-weight:bold;cursor:pointer}
.item{background:#fff;padding:10px;margin-bottom:10px;border-left:4px solid #0d47a1;border-radius:6px}
.item b{font-size:13px;color:#0d47a1}
.item p{margin:4px 0;font-size:12px}
.price{color:#c62828;font-weight:bold;font-size:14px}
.no-data{text-align:center;color:#999;padding:30px}
</style>
</head>
<body>

<div id="cats" class="page active">
<h1>🛒 ASPCC PRICE COMPARE</h1>
<input type="text" class="search" placeholder="🔍 Nema Category..." onkeyup="searchCat(this.value)">
<div class="grid" id="catGrid"></div>
</div>

<div id="items" class="page">
<button class="back" onclick="back()">⬅ BACK</button>
<input type="text" class="search" placeholder="🔍 Nema Item..." onkeyup="searchItem(this.value)">
<div id="content"></div>
</div>

<script src="data.js"></script>
<script>
let currentCat = '';

function loadCats(){
let catGrid = document.getElementById('catGrid');
catGrid.innerHTML = '';
for(let cat in data){
  let count = data[cat].length;
  let name = cat.charAt(0).toUpperCase() + cat.slice(1);
  catGrid.innerHTML += `<div class="box" onclick="openCat('${cat}')">${name}<br><small>${count} items</small></div>`;
}
}

function searchCat(val){
val = val.toLowerCase();
let catGrid = document.getElementById('catGrid');
catGrid.innerHTML = '';
for(let cat in data){
  if(cat.toLowerCase().includes(val)){
    let count = data[cat].length;
    let name = cat.charAt(0).toUpperCase() + cat.slice(1);
    catGrid.innerHTML += `<div class="box" onclick="openCat('${cat}')">${name}<br><small>${count} items</small></div>`;
  }
}
}

function openCat(cat){
currentCat = cat;
document.getElementById('cats').className = 'page';
document.getElementById('items').className = 'page active';
showItems('');
}

function searchItem(val){
showItems(val.toLowerCase());
}

function showItems(searchVal){
let html = `<h1>${currentCat.toUpperCase()}</h1>`;
let hasData = false;
for(let i=0; i<data[currentCat].length; i++){
  let item = data[currentCat][i];
  if(searchVal && item.item.toLowerCase().includes(searchVal) == false) continue;
  hasData = true;
  html += `<div class="item">
    <b>${item.item}</b>
    <p class="price">${item.price}</p>
    <p>🏪 ${item.shop}</p>
    <p>📍 ${item.location}</p>
    <p>📞 <a href="tel:${item.phone}">${item.phone}</a></p>
  </div>`;
}
if(!hasData) html += `<div class="no-data">Babu data tukuna<br><small>Je admin ka cika</small></div>`;
document.getElementById('content').innerHTML = html;
}

function back(){
document.getElementById('items').className = 'page';
document.getElementById('cats').className = 'page active';
}

if(typeof data!== 'undefined'){
  loadCats();
} else {
  document.getElementById('catGrid').innerHTML = '<div class="no-data">Babu data.js<br><small>Ka generate code a admin</small></div>';
}
</script>
</body>
</html>
